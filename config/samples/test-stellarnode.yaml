# test-stellarnode.yaml
# Minimal Testnet validator for CI, integration tests, and local dev.
# Canonical defaults are mirrored from examples/validator-testnet.yaml.
apiVersion: stellar.org/v1alpha1
kind: StellarNode
metadata:
  name: test-validator
  namespace: default
spec:
  nodeType: Validator
  network: testnet
  version: "v21.0.0"
  replicas: 1
  # Canonical default resource footprint for a Testnet validator.
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
  storage:
    storageClass: "standard"
    size: "100Gi"
    retentionPolicy: Delete
  validatorConfig:
    seedSecretRef: "validator-seed"
    enableHistoryArchive: true
